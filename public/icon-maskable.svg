<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
  </defs>
  <!-- Full background for masking -->
  <rect width="512" height="512" fill="url(#bg-grad)" />
  
  <!-- Keyboard Icon scaled to fit within the 80% safe zone circle -->
  <g transform="translate(144, 144) scale(3.5)" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Keyboard body -->
    <rect x="2" y="4" width="60" height="40" rx="6" stroke="#ffffff" stroke-width="2.5" />
    
    <!-- Keys row 1 -->
    <line x1="8" y1="14" x2="12" y2="14" stroke-width="3" />
    <line x1="18" y1="14" x2="22" y2="14" stroke-width="3" />
    <line x1="28" y1="14" x2="32" y2="14" stroke-width="3" />
    <line x1="38" y1="14" x2="42" y2="14" stroke-width="3" />
    <line x1="48" y1="14" x2="52" y2="14" stroke-width="3" />
    
    <!-- Keys row 2 -->
    <line x1="10" y1="24" x2="14" y2="24" stroke-width="3" />
    <line x1="20" y1="24" x2="24" y2="24" stroke-width="3" />
    <line x1="30" y1="24" x2="34" y2="24" stroke-width="3" />
    <line x1="40" y1="24" x2="44" y2="24" stroke-width="3" />
    <line x1="50" y1="24" x2="54" y2="24" stroke-width="3" />
    
    <!-- Spacebar and bottom row keys -->
    <line x1="12" y1="34" x2="16" y2="34" stroke-width="3" />
    <line x1="22" y1="34" x2="42" y2="34" stroke-width="4" />
    <line x1="48" y1="34" x2="52" y2="34" stroke-width="3" />
  </g>
</svg>
